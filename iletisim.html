    <section class="container mt-5">

        <h1 class="mb-4">İletişim</h1>

        <form action="form-sonuc.php" method="post" onsubmit="return formKontrol()">

            <div class="mb-3">
                <label class="form-label">Ad Soyad</label>
                <input type="text" id="adsoyad" name="adsoyad" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">E-posta</label>
                <input type="email" id="email" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Telefon</label>
                <input type="text" id="telefon" name="telefon" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Cinsiyet</label><br>

                <input type="radio" name="cinsiyet" value="Kadın"> Kadın
                <input type="radio" name="cinsiyet" value="Erkek" class="ms-3"> Erkek
            </div>

            <div class="mb-3">
                <label class="form-label">Konu</label>
                <select id="konu" name="konu" class="form-select">
                    <option value="">Seçiniz</option>
                    <option value="Bilgi">Bilgi</option>
                    <option value="Öneri">Öneri</option>
                    <option value="Şikayet">Şikayet</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">İlgi Alanları</label><br>

                <input type="checkbox" name="ilgiler[]" value="Web Tasarım"> Web Tasarım
                <input type="checkbox" name="ilgiler[]" value="Yazılım" class="ms-3"> Yazılım
                <input type="checkbox" name="ilgiler[]" value="Sinema" class="ms-3"> Sinema
            </div>

            <div class="mb-3">
                <label class="form-label">Mesaj</label>
                <textarea id="mesaj" name="mesaj" class="form-control" rows="5"></textarea>
            </div>

            <button type="submit" class="btn btn-dark">Gönder</button>
            <button type="reset" class="btn btn-secondary">Temizle</button>

        </form>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
